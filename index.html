<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Rainfall Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
  <main id="app">
    <div id="map" aria-label="Rainfall map"></div>
    <p id="attribution">© Met Office | © OpenStreetMap</p>
    <section id="timeline" aria-label="Time slider">
      <div id="timelineHeader">
        <div id="timeControls">
          <button id="resetNow" type="button">Now</button>
          <button id="playPause" type="button" aria-pressed="false" aria-label="Play playback">&#9654;</button>
        </div>
        <time id="timeLabel" datetime=""></time>
      </div>
      <div id="slider" role="slider" aria-valuemin="0" aria-valuemax="120" aria-valuenow="0" aria-label="Rainfall time slider" tabindex="0">
        <canvas id="ruler"></canvas>
        <div id="centerNeedle" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
